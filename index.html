<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitro Drift</title>
    <style>
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #333; font-family: sans-serif; 
            touch-action: none; position: fixed;
        }
        
        /* 広告枠：上下150px固定 */
        #ad-top, #ad-bottom { 
            position: absolute; left: 0; width: 100%; height: 150px; 
            background: #222; z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        #ad-top { top: 0; }
        #ad-bottom { bottom: 0; }
        iframe { border: none; width: 100%; height: 100%; }

        /* ゲームエリア */
        #main-container {
            position: absolute;
            top: 150px; bottom: 150px; left: 0; right: 0;
            background: #444; overflow: hidden; z-index: 10;
        }
        canvas { display: block; background: #555; width: 100%; height: 100%; }
        
        #ui { 
            position: absolute; top: 10px; left: 0; width: 100%; 
            text-align: center; color: white; font-size: 24px; font-weight: bold; 
            pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 20; 
            display: none;
        }
        
        /* メニュー画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 200; color: white; padding: 10px;
        }
        #ad-middle-container { width: 320px; height: 100px; background: rgba(255,255,255,0.05); margin: 15px 0; display: none; justify-content: center; align-items: center; border: 1px solid #f44336; }
        
        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        .menu-btn { width: 260px; padding: 15px; font-size: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        #retry-btn { background: #f44336; color: white; box-shadow: 0 4px #b71c1c; }
        #retry-btn:disabled { background: #666; box-shadow: none; opacity: 0.7; color: #aaa; }
        #other-games-btn { background: #ff4081; color: white; box-shadow: 0 4px #c2185b; }

        /* 大広告 */
        #bigAdScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; justify-content: center; align-items: center; }
        .ad-frame-wrapper { width: 95%; height: 85%; position: relative; }
        .ad-close-btn { position: absolute; top: -15px; right: -15px; color: white; font-size: 22px; font-weight: bold; cursor: pointer; background: rgba(0,0,0,0.8); width: 44px; height: 44px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 3100; border: 2px solid white; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top"><iframe id="frame-top" src="ad.html?pos=top"></iframe></div>

    <div id="main-container">
        <div id="ui">0 km</div>
        <canvas id="gameCanvas"></canvas>

        <div id="menuScreen">
            <h1 id="result-msg" style="color:#f44336; margin:0; font-style: italic; font-size: 32px;">NITRO DRIFT</h1>
            <p id="menu-desc" style="margin:10px 0; font-size: 15px; text-align: center;">左右スライドで障害物を避けろ！<br>BEST: <span id="best-ui">0</span> km</p>
            
            <div id="ad-middle-container">
                <script async src="https://imp-adedge.i-mobile.co.jp/script/v1/spot.js?20220104"></script>
                <div id="im-1e6de436ea850948e238e975a93767eb">
                    <script>(window.adsbyimobile=window.adsbyimobile||[]).push({pid:84561,mid:590804,asid:1924211,type:"banner",display:"inline",elementid:"im-1e6de436ea850948e238e975a93767eb"})</script>
                </div>
            </div>

            <div class="menu-btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ RACE START ★</button>
                <a href="https://saaaachi.github.io/" class="menu-btn" id="other-games-btn">他のゲームへ</a>
            </div>
        </div>

        <div id="bigAdScreen"><div class="ad-frame-wrapper"><div id="ad-close-btn" class="ad-close-btn" onclick="closeBigAd()"></div><iframe id="ad-large-frame" src="" style="width:100%; height:100%; border:none;"></iframe></div></div>
    </div>

    <div id="ad-bottom"><iframe id="frame-bottom" src="ad.html?pos=bottom"></iframe></div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"), ui = document.getElementById("ui"), menuScreen = document.getElementById("menuScreen"), adMid = document.getElementById("ad-middle-container"), bestUi = document.getElementById("best-ui"), retryBtn = document.getElementById("retry-btn");

        let score = 0, bestScore = localStorage.getItem("nitro_drift_best") || 0, playCount = 0, gameActive = false;
        let player = { x: 0, y: 0, w: 34, h: 55 }, enemies = [], enemyTimer;
        
        function resize() {
            const container = document.getElementById("main-container");
            canvas.width = container.clientWidth; canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize); resize();
        bestUi.innerText = bestScore;

        function startNewGame() {
            menuScreen.style.display = "none"; adMid.style.display = "none"; ui.style.display = "block";
            gameActive = true; score = 0; enemies = [];
            player.x = canvas.width / 2; player.y = canvas.height - 80;
            spawnEnemy(); update();
        }

        function handleMove(e) {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            player.x = clientX - rect.left;
            player.x = Math.max(player.w/2, Math.min(canvas.width - player.w/2, player.x));
        }
        canvas.addEventListener("touchmove", (e) => { handleMove(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("mousemove", handleMove);

        function spawnEnemy() {
            if(!gameActive) return;
            enemies.push({ x: Math.random() * (canvas.width - 32), y: -70, w: 32, h: 52, speed: 5 + (score / 100) });
            enemyTimer = setTimeout(spawnEnemy, Math.max(180, 550 - (score / 2)));
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景
            ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.setLineDash([30, 30]); ctx.lineDashOffset = -(score * 10);
            ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke();

            // 自車
            ctx.fillStyle = "#2196F3"; ctx.fillRect(player.x - player.w/2, player.y, player.w, player.h);
            ctx.fillStyle = "black"; ctx.fillRect(player.x - player.w/2 - 3, player.y+8, 4, 12); ctx.fillRect(player.x + player.w/2 - 1, player.y+8, 4, 12);

            for(let i = enemies.length - 1; i >= 0; i--) {
                let en = enemies[i]; en.y += en.speed;
                ctx.fillStyle = "#f44336"; ctx.fillRect(en.x, en.y, en.w, en.h);
                if (player.x - player.w/2 + 4 < en.x + en.w && player.x + player.w/2 - 4 > en.x && player.y + 4 < en.y + en.h && player.y + player.h - 4 > en.y) {
                    gameOver(); return;
                }
                if(en.y > canvas.height) enemies.splice(i, 1);
            }
            score += 0.2; ui.innerText = Math.floor(score) + " km";
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false; playCount++; clearTimeout(enemyTimer);
            let finalScore = Math.floor(score);
            if(finalScore > bestScore) { bestScore = finalScore; localStorage.setItem("nitro_drift_best", bestScore); bestUi.innerText = bestScore; }
            document.getElementById("result-msg").innerText = "COLLISION!";
            document.getElementById("menu-desc").innerText = "SCORE: " + finalScore + " km\nBEST: " + bestScore + " km";
            retryBtn.innerText = "お待ちください..."; retryBtn.disabled = true;
            adMid.style.display = "flex"; menuScreen.style.display = "flex";
            setTimeout(() => { retryBtn.disabled = false; retryBtn.innerText = "もう一度遊ぶ"; }, 1500);
            if(playCount % 2 === 0) setTimeout(showBigAd, 500);
        }

        function showBigAd() {
            const screen = document.getElementById("bigAdScreen"), closeBtn = document.getElementById("ad-close-btn");
            document.getElementById("ad-large-frame").src = "./ad.large.html?t=" + Date.now();
            screen.style.display = "flex";
            let countdown = 5; closeBtn.style.display = "flex"; closeBtn.innerText = countdown; closeBtn.style.pointerEvents = "none";
            const timerInt = setInterval(() => {
                countdown--; closeBtn.innerText = countdown;
                if (countdown <= 0) { clearInterval(timerInt); closeBtn.innerText = "×"; closeBtn.style.pointerEvents = "auto"; }
            }, 1000);
        }
        function closeBigAd() { document.getElementById("bigAdScreen").style.display = "none"; }
    </script>
</body>
</html>
